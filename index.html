<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiologist Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8 px-4">

    <div id="app" class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="p-6">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Masking Assistant</h1>

            <!-- 模式切換 -->
            <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
                <button onclick="setMode('pta')" id="tab-pta" class="flex-1 py-2 rounded-lg font-medium transition-all bg-white shadow-sm">Pure Tone</button>
                <button onclick="setMode('speech')" id="tab-speech" class="flex-1 py-2 rounded-lg font-medium transition-all text-gray-500">Speech</button>
            </div>

            <!-- 計算內容區域 -->
            <div id="content" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let state = {
            mode: 'pta',
            transducer: 'insert', // insert: IA=50, headphones: IA=40
            pta: { teAC: 0, teBC: 0, nteAC: 0, nteBC: 0 },
            speech: { presentationLevel: 0, nteBestBC: 0 }
        };

        function setMode(mode) {
            state.mode = mode;
            document.getElementById('tab-pta').className = `flex-1 py-2 rounded-lg font-medium transition-all ${mode === 'pta' ? 'bg-white shadow-sm' : 'text-gray-500'}`;
            document.getElementById('tab-speech').className = `flex-1 py-2 rounded-lg font-medium transition-all ${mode === 'speech' ? 'bg-white shadow-sm' : 'text-gray-500'}`;
            render();
        }

        function render() {
            const container = document.getElementById('content');
            
            // 轉接器選擇 (通用)
            let transducerHtml = `
                <select onchange="state.transducer=this.value; render()" class="w-full p-3 border rounded-xl bg-gray-50 mb-4">
                    <option value="insert" ${state.transducer==='insert'?'selected':''}>Insert Earphones (IA=50dB)</option>
                    <option value="headphones" ${state.transducer==='headphones'?'selected':''}>Headphones (IA=40dB)</option>
                </select>
            `;

            if (state.mode === 'pta') {
                container.innerHTML = `
                    ${transducerHtml}
                    <div class="grid grid-cols-2 gap-3">
                        ${['teAC', 'teBC', 'nteAC', 'nteBC'].map(k => `
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase">${k}</label>
                                <input type="number" oninput="state.pta.${k}=Number(this.value); renderResults()" class="w-full p-3 border rounded-xl" value="${state.pta[k]}">
                            </div>
                        `).join('')}
                    </div>
                    <div id="results" class="bg-blue-50 p-4 rounded-xl text-blue-800 text-sm"></div>
                `;
            } else {
                container.innerHTML = `
                    ${transducerHtml}
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase">Speech Presentation Level (dB HL)</label>
                            <input type="number" oninput="state.speech.presentationLevel=Number(this.value); renderResults()" class="w-full p-3 border rounded-xl" value="${state.speech.presentationLevel}">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase">NTE Best BC (dB HL)</label>
                            <input type="number" oninput="state.speech.nteBestBC=Number(this.value); renderResults()" class="w-full p-3 border rounded-xl" value="${state.speech.nteBestBC}">
                        </div>
                    </div>
                    <div id="results" class="bg-purple-50 p-4 rounded-xl text-purple-800 text-sm"></div>
                `;
            }
            renderResults();
        }

        function renderResults() {
            const resultsDiv = document.getElementById('results');
            const ia = state.transducer === 'insert' ? 50 : 40;

            if (state.mode === 'pta') {
                const { teAC, teBC, nteAC, nteBC } = state.pta;
                const abgNTE = Math.max(0, nteAC - nteBC);
                const acMax = teBC + ia; 
                const acMin = teAC - ia + abgNTE;
                resultsDiv.innerHTML = `
                    <div class="font-bold mb-2">Masking Level:</div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>Max Masking: <b>${Math.max(0, acMax)} dB</b></div>
                        <div>Min Masking: <b>${Math.max(0, acMin)} dB</b></div>
                    </div>
                `;
            } else {
                // Speech Masking: Presentation Level - IA + NTE BC
                const needed = state.speech.presentationLevel - ia + state.speech.nteBestBC;
                resultsDiv.innerHTML = `
                    <div class="font-bold mb-2">Speech Masking 計算結果:</div>
                    <div>建議遮蔽音量: <b class="text-lg">${Math.max(0, needed)} dB EM</b></div>
                    <p class="text-xs mt-2 opacity-70">*公式: Presentation Level - IA + NTE Best BC</p>
                `;
            }
        }

        render();
    </script>
</body>
</html>
